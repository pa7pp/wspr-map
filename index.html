

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR Activity Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 8px;
      font-family: monospace;
      z-index: 1000;
    }
  </style>
</head>

<body>

<div id="info">loading WSPR...</div>
<div id="map"></div>

<script>

// 🗺️ MAP
const map = L.map('map').setView([52, 5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const layer = L.layerGroup().addTo(map);

const info = document.getElementById("info");

// 🧠 CORS PROXY + WSPR API
function buildUrl(sql) {

  const wsprUrl =
    "https://db1.wspr.live/?query=" +
    encodeURIComponent(sql);

  return "https://api.allorigins.win/raw?url=" +
    encodeURIComponent(wsprUrl);
}

async function load() {

  const sql = `
SELECT tx_sign, rx_sign, tx_lat, tx_lon, snr, band, time
FROM wspr.rx
ORDER BY time DESC
LIMIT 300
FORMAT JSON`;

  const url = buildUrl(sql);

  try {

    const res = await fetch(url);
    const json = await res.json();
    const data = json.data || [];

    console.log("spots:", data.length);

    info.innerText = `WSPR spots: ${data.length}`;

    layer.clearLayers();

    const bounds = [];

    data.forEach(s => {

      if (!s.tx_lat || !s.tx_lon) return;

      const tx = [s.tx_lat, s.tx_lon];
      bounds.push(tx);

      L.circleMarker(tx, {
        radius: 5,
        color: "red"
      }).addTo(layer)
      .bindPopup(
        `<b>TX:</b> ${s.tx_sign}<br>
         <b>RX:</b> ${s.rx_sign}<br>
         <b>Band:</b> ${s.band}<br>
         <b>SNR:</b> ${s.snr}<br>
         <b>Time:</b> ${s.time}`
      );

    });

    if (bounds.length > 0) {
      map.fitBounds(bounds);
    }

  } catch (e) {
    console.log("ERROR:", e);
    info.innerText = "ERROR loading WSPR data";
  }
}

// 🚀 start
load();
setInterval(load, 30000);

</script>

</body>
</html>
