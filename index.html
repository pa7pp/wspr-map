
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR TX RX Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const params = new URLSearchParams(window.location.search);
const CALLSIGN = params.get("call") || "DL0NOT";

const map = L.map('map').setView([52, 5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const layer = L.layerGroup().addTo(map);

function clearMap() {
  layer.clearLayers();
}

async function load() {

  clearMap();

  const sql = `
SELECT tx_sign, rx_sign, tx_lat, tx_lon, rx_lat, rx_lon, snr, band, time
FROM wspr.rx
ORDER BY time DESC
LIMIT 300
FORMAT JSON`;

  const url = "https://db1.wspr.live/?query=" + encodeURIComponent(sql);

  try {

    const res = await fetch(url);
    const text = await res.text();

    let json;
    try {
      json = JSON.parse(text);
    } catch (e) {
      console.log("RAW:", text);
      return;
    }

    const data = json.data || [];

    console.log("spots:", data.length);

    const bounds = [];

    data.forEach(s => {

      // filter op call (optioneel)
      if (CALLSIGN && s.tx_sign !== CALLSIGN) return;

      if (!s.tx_lat || !s.tx_lon || !s.rx_lat || !s.rx_lon) return;

      const tx = [s.tx_lat, s.tx_lon];
      const rx = [s.rx_lat, s.rx_lon];

      bounds.push(tx);
      bounds.push(rx);

      // 🔴 TX (zender)
      L.circleMarker(tx, {
        radius: 5,
        color: "red"
      }).addTo(layer)
      .bindPopup(
        `<b>TX</b>: ${s.tx_sign}<br>${s.time}`
      );

      // 🔵 RX (spotter)
      L.circleMarker(rx, {
        radius: 5,
        color: "blue"
      }).addTo(layer)
      .bindPopup(
        `<b>RX</b>: ${s.rx_sign}<br>${s.band} | ${s.snr} dB`
      );

      // 🟢 propagation line
      L.polyline([tx, rx], {
        color: "green",
        weight: 1,
        opacity: 0.4
      }).addTo(layer);

    });

    if (bounds.length > 0) {
      map.fitBounds(bounds);
    }

  } catch (err) {
    console.log("ERROR:", err);
  }
}

load();
setInterval(load, 60000);

</script>
</body>
</html>
