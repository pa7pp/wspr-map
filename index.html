
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR Stable Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 8px;
      font-family: monospace;
      z-index: 1000;
    }
  </style>
</head>

<body>

<div id="info">loading local wspr.json...</div>
<div id="map"></div>

<script>

// 🗺️ map
const map = L.map('map').setView([52, 5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const layer = L.layerGroup().addTo(map);

const info = document.getElementById("info");

// 📡 load LOCAL JSON (geen CORS issues meer!)
async function load() {

  try {

    const res = await fetch("wspr.json");
    const data = await res.json();

    console.log("spots:", data.length);

    info.innerText = "spots: " + data.length;

    layer.clearLayers();

    const bounds = [];

    data.forEach(s => {

      if (!s.tx_lat || !s.tx_lon) return;

      const tx = [s.tx_lat, s.tx_lon];
      bounds.push(tx);

      L.circleMarker(tx, {
        radius: 5,
        color: "red"
      }).addTo(layer)
      .bindPopup(
        `<b>${s.tx_sign}</b><br>${s.rx_sign || ""}<br>${s.band || ""}`
      );

    });

    if (bounds.length > 0) {
      map.fitBounds(bounds);
    }

  } catch (e) {
    console.log("ERROR:", e);
    info.innerText = "wspr.json missing or invalid";
  }
}

load();

</script>

</body>
</html>
