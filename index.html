<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR Live Trail Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

// 📡 call uit URL
const params = new URLSearchParams(window.location.search);
const CALLSIGN = (params.get("call") || "DL0NOT").toUpperCase();

// 🗺️ map
const map = L.map('map').setView([52, 5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const layer = L.layerGroup().addTo(map);

// 🧠 trail memory
const seen = new Set();

async function load() {

  const sql = `
SELECT tx_sign, rx_sign, tx_lat, tx_lon, rx_lat, rx_lon, snr, band, time
FROM wspr.rx
ORDER BY time DESC
LIMIT 300
FORMAT JSON`;

  const url =
    "https://db1.wspr.live/?query=" +
    encodeURIComponent(sql);

  try {

    const res = await fetch(url);
    const json = await res.json();
    const data = json.data || [];

    console.log("spots:", data.length);

    const bounds = [];

    data.forEach(s => {

      if (!s.tx_lat || !s.tx_lon) return;

      const txCall = (s.tx_sign || "").toUpperCase();
      const rxCall = (s.rx_sign || "").toUpperCase();

      // 📡 juiste WSPR filter (TX OF RX match)
      if (
        CALLSIGN &&
        txCall !== CALLSIGN &&
        rxCall !== CALLSIGN
      ) return;

      const key = `${txCall}-${rxCall}-${s.time}`;
      if (seen.has(key)) return;
      seen.add(key);

      const tx = [s.tx_lat, s.tx_lon];
      bounds.push(tx);

      // 🔴 TX marker
      L.circleMarker(tx, {
        radius: 5,
        color: "red"
      }).addTo(layer)
      .bindPopup(
        `<b>TX:</b> ${txCall}<br>
         <b>RX:</b> ${rxCall}<br>
         ${s.band || ""} | ${s.snr || ""}<br>
         ${s.time || ""}`
      );

      // 🟢 RX lijn (alleen als coords bestaan)
      if (s.rx_lat && s.rx_lon) {

        const rx = [s.rx_lat, s.rx_lon];
        bounds.push(rx);

        L.polyline([tx, rx], {
          color: "lime",
          weight: 1,
          opacity: 0.4
        }).addTo(layer);
      }

    });

    if (bounds.length > 0) {
      map.fitBounds(bounds);
    }

  } catch (e) {
    console.log("ERROR:", e);
  }
}

// 🚀 start + refresh
load();
setInterval(load, 30000);

</script>
</body>
</html>
