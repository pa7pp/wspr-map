
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR Debug Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
    #info {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 8px;
      z-index: 1000;
      font-family: monospace;
    }
  </style>
</head>

<body>

<div id="info">loading...</div>
<div id="map"></div>

<script>

// 🗺️ MAP INIT
const map = L.map('map').setView([52, 5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const layer = L.layerGroup().addTo(map);

// 📡 INFO BOX
const info = document.getElementById("info");

// 🧠 LOAD DATA
async function load() {

  const sql = `
SELECT tx_sign, rx_sign, tx_lat, tx_lon, rx_lat, rx_lon, snr, band, time
FROM wspr.rx
ORDER BY time DESC
LIMIT 300
FORMAT JSON`;

  const url = "https://db1.wspr.live/?query=" + encodeURIComponent(sql);

  try {

    const res = await fetch(url);
    const text = await res.text();

    console.log("RAW RESPONSE:", text);

    let json;
    try {
      json = JSON.parse(text);
    } catch (e) {
      info.innerText = "JSON ERROR (check console)";
      return;
    }

    const data = json.data || [];

    info.innerText = "spots: " + data.length;

    console.log("spots loaded:", data.length);

    layer.clearLayers();

    let count = 0;

    data.forEach(s => {

      if (!s.tx_lat || !s.tx_lon) return;

      const tx = [s.tx_lat, s.tx_lon];

      L.circleMarker(tx, {
        radius: 4,
        color: "red"
      }).addTo(layer)
      .bindPopup(
        `${s.tx_sign} → ${s.rx_sign}<br>${s.band || ""}`
      );

      count++;

    });

    info.innerText += " | drawn: " + count;

    if (count === 0) {
      info.innerText += " | NO COORD DATA";
    }

  } catch (err) {
    console.log("ERROR:", err);
    info.innerText = "FETCH ERROR";
  }
}

// 🚀 START
load();
setInterval(load, 30000);

</script>
</body>
</html>
