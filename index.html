
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const params = new URLSearchParams(window.location.search);
const CALLSIGN = params.get("call") || "DL0NOT";

// 🗺️ map init
const map = L.map('map').setView([52.1, 5.1], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// 📡 grid converter (Maidenhead)
function gridToLatLon(grid) {
  grid = grid.toUpperCase();

  let lon = (grid.charCodeAt(0) - 65) * 20 - 180;
  let lat = (grid.charCodeAt(1) - 65) * 10 - 90;

  lon += parseInt(grid[2]) * 2;
  lat += parseInt(grid[3]) * 1;

  lon += (grid.charCodeAt(4) - 65) * (5/60);
  lat += (grid.charCodeAt(5) - 65) * (2.5/60);

  return { lat, lon };
}

// 🔍 robuuste grid extractor
function getGrid(s) {
  return s.grid || s.grid4 || s.gridsquare || null;
}

// 📥 data laden
async function loadSpots() {

  const url = `https://www.wsprnet.org/olddb?mode=json&callsign=${CALLSIGN}&limit=300`;

  const res = await fetch(url);
  const data = await res.json();

  const points = [];

  data.forEach(s => {

    const grid = getGrid(s);
    if (!grid) return;

    const p = gridToLatLon(grid);

    points.push([p.lat, p.lon]);

    L.circleMarker([p.lat, p.lon], {
      radius: 5
    }).addTo(map)
    .bindPopup(
      `${s.tx_sign || "?"} → ${s.rx_sign || "?"}<br>
       SNR: ${s.snr || "?"}<br>
       Band: ${s.band || "?"}<br>
       Time: ${s.time || ""}`
    );
  });

  // zoom naar data
  if (points.length > 0) {
    map.fitBounds(points);
  }
}

loadSpots();
setInterval(loadSpots, 60000);

</script>
</body>
</html>
