
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR Live Map FIXED</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const params = new URLSearchParams(window.location.search);
const CALLSIGN = params.get("call") || "DL0NOT";

const map = L.map('map').setView([52, 5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

const layer = L.layerGroup().addTo(map);

function clearMap() {
  layer.clearLayers();
}

async function load() {

  clearMap();

  // 🚨 CLEAN SQL (NO leading spaces, NO newline issues)
  const sql =
`SELECT tx_sign, rx_sign, tx_lat, tx_lon, snr, band, time
FROM wspr.rx
ORDER BY time DESC
LIMIT 300
FORMAT JSON`;

  // 🚨 ALWAYS encode
  const url =
    "https://db1.wspr.live/?query=" +
    encodeURIComponent(sql);

  try {

    const res = await fetch(url);

    const text = await res.text();

    // debug safety
    if (!text.startsWith("{")) {
      console.log("SERVER RESPONSE (not JSON):", text);
      return;
    }

    const json = JSON.parse(text);
    const data = json.data || [];

    console.log("spots:", data.length);

    const bounds = [];

    data.forEach(s => {

      // filter client-side
      if (CALLSIGN && s.tx_sign !== CALLSIGN) return;

      if (!s.tx_lat || !s.tx_lon) return;

      bounds.push([s.tx_lat, s.tx_lon]);

      L.circleMarker([s.tx_lat, s.tx_lon], {
        radius: 4
      }).addTo(layer)
      .bindPopup(
        `${s.tx_sign} → ${s.rx_sign}<br>
         SNR: ${s.snr}<br>
         Band: ${s.band}<br>
         ${s.time}`
      );
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds);
    }

  } catch (e) {
    console.log("ERROR:", e);
  }
}

load();
setInterval(load, 60000);

</script>
</body>
</html>
