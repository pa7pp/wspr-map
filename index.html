
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WSPR Live Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }
  </style>
</head>

<body>
<div id="map"></div>

<script>

const params = new URLSearchParams(window.location.search);
const CALLSIGN = params.get("call") || "DL0NOT";

const map = L.map('map').setView([52, 5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18
}).addTo(map);

// 🧠 wspr.live uses full lat/lon already (BELANGRIJK!)
function addPoint(s) {

  if (!s.tx_lat || !s.tx_lon) return;

  const lat = s.tx_lat;
  const lon = s.tx_lon;

  L.circleMarker([lat, lon], {
    radius: 4
  }).addTo(map)
  .bindPopup(
    `${s.tx_sign} → ${s.rx_sign}<br>
     SNR: ${s.snr} dB<br>
     Band: ${s.band}<br>
     Time: ${s.time}`
  );
}

async function load() {

  const sql = `
    SELECT *
    FROM wspr.rx
    WHERE tx_sign='${CALLSIGN}'
    ORDER BY time DESC
    LIMIT 300
    FORMAT JSON
  `;

  const url = "https://db1.wspr.live/?query=" + encodeURIComponent(sql);

  const res = await fetch(url);
  const json = await res.json();

  const data = json.data || [];

  console.log("spots:", data.length);

  data.forEach(addPoint);

}

load();
setInterval(load, 60000);

</script>
</body>
</html>
